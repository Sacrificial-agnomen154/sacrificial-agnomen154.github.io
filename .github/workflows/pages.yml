name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A24E4B: ${{ secrets.A24E4B }}
          BCD1AC: ${{ secrets.BCD1AC }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A24E4B', '')
          meta_b = os.environ.get('BCD1AC', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- 9b08697e2659dd5a139f72d361cc -->', meta_a)
          if meta_b:
              out = out.replace('<!-- 02fc8ff609e3d055d5e6be4113c1 -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
